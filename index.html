<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Branching Workshop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Git Branching Explorer</h1>
        <p>Estado actual: <span id="branch-name">Main</span></p>

            <p id="description">Crea una nueva rama y se mueve a ella.</p>
        </div>

        <button id="btn-action">Simular Cambio</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
